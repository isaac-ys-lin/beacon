name: Beacon
options:
  bundleIdPrefix: com.isaacyslin
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_DEBUG_DYLIB: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_STYLE: Manual
targets:
  BeaconMac:
    type: application
    platform: macOS
    sources:
      - path: Beacon/Shared
      - path: Beacon/Mac
    info:
      path: Beacon/Mac/Info.plist
      properties:
        CFBundleDisplayName: Beacon
        LSUIElement: true
        NSBluetoothAlwaysUsageDescription: Beacon reads connected Bluetooth device battery reports when available.
    entitlements:
      path: Beacon/Mac/BeaconMac.entitlements
      properties:
        # NOT sandboxed: Beacon shells out to ideviceinfo (outside the bundle,
        # talking to usbmuxd) to read USB iPhone battery. The App Sandbox blocks
        # spawning external binaries, so enabling it silently breaks iPhone-over-
        # USB. Keep this app non-sandboxed (no MAS) — see docs / design notes.
        com.apple.security.device.bluetooth: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacyslin.Beacon.mac
        PRODUCT_MODULE_NAME: Beacon
  BeaconTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BeaconTests
    dependencies:
      - target: BeaconMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacyslin.Beacon.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BeaconMac.app/Contents/MacOS/BeaconMac
        BUNDLE_LOADER: $(TEST_HOST)
  BeaconUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: BeaconUITests
    dependencies:
      - target: BeaconMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacyslin.Beacon.uitests
        TEST_TARGET_NAME: BeaconMac
schemes:
  BeaconMac:
    build:
      targets:
        BeaconMac: all
    test:
      targets:
        - BeaconTests
      gatherCoverageData: false
