<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BatteryHub UIUX Prototype</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --desktop-a: #d9dee6;
      --desktop-b: #f5f2ec;
      --desktop-c: #bfc9c2;
      --text: rgba(25, 25, 28, .94);
      --muted: rgba(45, 45, 50, .58);
      --faint: rgba(45, 45, 50, .36);
      --separator: rgba(60, 60, 67, .14);
      --accent: #0a63ff;
      --green: #35c759;
      --amber: #d58a12;
      --red: #e0443e;
      --panel: rgba(246, 246, 248, .78);
      --panel-strong: rgba(255, 255, 255, .88);
      --card: rgba(255, 255, 255, .58);
      --hover: rgba(10, 99, 255, .08);
      --shadow: rgba(30, 31, 36, .20);
      --ring: rgba(255, 255, 255, .58);
      --radius-panel: 28px;
      --radius-card: 14px;
      --row-h: 56px;
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang TC", sans-serif;
    }

    [data-theme="dark"] {
      --desktop-a: #202124;
      --desktop-b: #42413b;
      --desktop-c: #1c2930;
      --text: rgba(255, 255, 255, .92);
      --muted: rgba(235, 235, 245, .62);
      --faint: rgba(235, 235, 245, .38);
      --separator: rgba(255, 255, 255, .12);
      --panel: rgba(33, 34, 38, .76);
      --panel-strong: rgba(48, 49, 54, .86);
      --card: rgba(255, 255, 255, .075);
      --hover: rgba(72, 151, 255, .15);
      --shadow: rgba(0, 0, 0, .42);
      --ring: rgba(255, 255, 255, .16);
      color-scheme: dark;
    }

    [data-density="compact"] {
      --row-h: 48px;
      --radius-panel: 22px;
      --radius-card: 11px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #d9dee6;
      color: var(--text);
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .desktop {
      min-height: 100vh;
      position: relative;
      color: var(--text);
      background:
        linear-gradient(135deg, var(--desktop-a) 0%, var(--desktop-b) 52%, var(--desktop-c) 100%);
    }

    .menu-bar {
      height: 28px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: rgba(255, 255, 255, .88);
      background: rgba(30, 30, 34, .18);
      -webkit-backdrop-filter: blur(24px) saturate(1.35);
      backdrop-filter: blur(24px) saturate(1.35);
      border-bottom: 1px solid rgba(255, 255, 255, .10);
      user-select: none;
    }

    [data-theme="light"] .menu-bar {
      color: rgba(22, 22, 24, .78);
      background: rgba(255, 255, 255, .22);
      border-bottom-color: rgba(255, 255, 255, .30);
    }

    .apple-mark {
      width: 14px;
      height: 16px;
      border-radius: 42% 42% 48% 48%;
      background: currentColor;
      opacity: .92;
    }

    .menu-title {
      font-size: 13px;
      font-weight: 700;
    }

    .menu-spacer {
      flex: 1;
    }

    .menu-status {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .workspace {
      position: absolute;
      inset: 28px 0 0 0;
      display: grid;
      grid-template-columns: 1fr 368px;
      gap: 28px;
      padding: 28px;
      align-items: start;
    }

    .stage {
      position: relative;
      min-height: calc(100vh - 84px);
    }

    .popover-anchor {
      position: absolute;
      top: -4px;
      right: clamp(24px, 11vw, 180px);
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      background: var(--panel);
      border-left: 1px solid rgba(255, 255, 255, .24);
      border-top: 1px solid rgba(255, 255, 255, .24);
      -webkit-backdrop-filter: blur(26px) saturate(1.4);
      backdrop-filter: blur(26px) saturate(1.4);
    }

    .popover {
      position: absolute;
      top: 14px;
      right: clamp(24px, 9vw, 156px);
      width: min(390px, calc(100vw - 440px));
      min-width: 360px;
      max-height: calc(100vh - 88px);
      padding: 16px;
      overflow: hidden;
      border-radius: var(--radius-panel);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, .28);
      box-shadow:
        0 22px 70px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, .42);
      -webkit-backdrop-filter: blur(28px) saturate(1.45);
      backdrop-filter: blur(28px) saturate(1.45);
    }

    .popover.variant-airbuddy {
      background: color-mix(in srgb, var(--panel) 80%, #ffffff 20%);
    }

    [data-theme="dark"] .popover.variant-airbuddy {
      background: rgba(30, 30, 33, .84);
    }

    .popover.variant-compact {
      padding: 12px;
      border-radius: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px 12px;
    }

    .header-title {
      margin: 0;
      color: var(--accent);
      font-size: 20px;
      line-height: 1.1;
      font-weight: 780;
      letter-spacing: 0;
    }

    .header-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .icon-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background .14s ease, transform .14s ease, color .14s ease;
    }

    .icon-button:hover {
      background: var(--hover);
      color: var(--text);
    }

    .icon-button:active {
      transform: scale(.94);
    }

    .toolbar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: softIn .18s ease both;
    }

    @keyframes softIn {
      from { opacity: 0; transform: translateY(4px) scale(.995); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .screen.active {
        animation: none;
      }

      * {
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
      }
    }

    .section-card {
      overflow: hidden;
      border-radius: var(--radius-card);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow:
        0 10px 26px rgba(0, 0, 0, .055),
        inset 0 1px 0 rgba(255, 255, 255, .36);
    }

    .section-card + .section-card {
      margin-top: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: var(--row-h);
      padding: 0 14px;
      position: relative;
      cursor: default;
    }

    .row + .row {
      border-top: 1px solid var(--separator);
    }

    .row:hover,
    .row.selected {
      background: var(--hover);
    }

    .device-icon {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }

    .device-glyph {
      position: relative;
      display: block;
      width: 22px;
      height: 16px;
      border: 1.8px solid currentColor;
      border-radius: 4px;
      opacity: .86;
    }

    .device-glyph.phone {
      width: 13px;
      height: 23px;
      border-radius: 4px;
    }

    .device-glyph.watch {
      width: 13px;
      height: 18px;
      border-radius: 5px;
    }

    .device-glyph.watch::before,
    .device-glyph.watch::after {
      content: "";
      position: absolute;
      left: 3px;
      width: 7px;
      height: 5px;
      border-radius: 3px;
      background: currentColor;
      opacity: .42;
    }

    .device-glyph.watch::before {
      top: -7px;
    }

    .device-glyph.watch::after {
      bottom: -7px;
    }

    .device-glyph.keyboard {
      width: 24px;
      height: 14px;
      border-radius: 3px;
      background:
        linear-gradient(currentColor 0 0) 5px 4px / 2px 2px no-repeat,
        linear-gradient(currentColor 0 0) 10px 4px / 2px 2px no-repeat,
        linear-gradient(currentColor 0 0) 15px 4px / 2px 2px no-repeat,
        linear-gradient(currentColor 0 0) 5px 8px / 14px 2px no-repeat;
    }

    .device-glyph.mouse {
      width: 13px;
      height: 22px;
      border-radius: 999px;
    }

    .device-glyph.airpods {
      width: 22px;
      height: 20px;
      border: 0;
    }

    .device-glyph.airpods::before,
    .device-glyph.airpods::after {
      content: "";
      position: absolute;
      top: 1px;
      width: 8px;
      height: 13px;
      border: 1.8px solid currentColor;
      border-radius: 7px 7px 5px 5px;
    }

    .device-glyph.airpods::before {
      left: 2px;
      transform: rotate(-10deg);
    }

    .device-glyph.airpods::after {
      right: 2px;
      transform: rotate(10deg);
    }

    .device-glyph.trackpad {
      width: 24px;
      height: 17px;
      border-radius: 3px;
    }

    .device-meta {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .device-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 610;
    }

    .device-detail {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .battery-cluster {
      display: flex;
      align-items: center;
      gap: 8px;
      font-variant-numeric: tabular-nums;
    }

    .percent {
      min-width: 35px;
      text-align: right;
      font-size: 12px;
      font-weight: 750;
    }

    .percent.low {
      color: var(--red);
    }

    .percent.stale {
      color: var(--amber);
    }

    .battery {
      width: 34px;
      height: 18px;
      position: relative;
      border: 1.6px solid color-mix(in srgb, currentColor 45%, transparent);
      border-radius: 5px;
      color: var(--faint);
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 5px;
      width: 2px;
      height: 6px;
      border-radius: 2px;
      background: currentColor;
      opacity: .5;
    }

    .battery-fill {
      position: absolute;
      left: 3px;
      top: 3px;
      bottom: 3px;
      min-width: 4px;
      border-radius: 3px;
      background: var(--green);
    }

    .battery-fill.warn {
      background: var(--amber);
    }

    .battery-fill.low {
      background: var(--red);
    }

    .bolt {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 10px;
      font-weight: 900;
      text-shadow: 0 1px 1px rgba(0, 0, 0, .25);
    }

    .chips {
      grid-column: 2 / 4;
      display: flex;
      gap: 6px;
      padding-bottom: 10px;
      flex-wrap: wrap;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 23px;
      padding: 0 7px;
      border-radius: 6px;
      color: var(--muted);
      background: rgba(255, 255, 255, .22);
      border: 1px solid rgba(255, 255, 255, .14);
      font-size: 11px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    [data-theme="dark"] .chip {
      background: rgba(255, 255, 255, .07);
    }

    .mini-battery {
      width: 20px;
      height: 10px;
      position: relative;
      border: 1px solid var(--faint);
      border-radius: 3px;
    }

    .mini-battery::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 3px;
      width: 1.5px;
      height: 3px;
      background: var(--faint);
      border-radius: 1px;
    }

    .mini-fill {
      position: absolute;
      top: 2px;
      bottom: 2px;
      left: 2px;
      min-width: 2px;
      border-radius: 2px;
      background: var(--green);
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
      padding: 12px 4px 0;
      color: var(--muted);
      font-size: 11px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .24);
      border: 1px solid rgba(255, 255, 255, .16);
      font-size: 11px;
      font-weight: 650;
    }

    [data-theme="dark"] .status-pill {
      background: rgba(255, 255, 255, .07);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 20%, transparent);
    }

    .dot.warn {
      background: var(--amber);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--amber) 20%, transparent);
    }

    .hud {
      display: grid;
      justify-items: center;
      gap: 16px;
      min-height: 316px;
      padding: 22px 18px 18px;
      text-align: center;
    }

    .hud h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hud p {
      margin: -8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .airpods-art {
      width: 160px;
      height: 128px;
      position: relative;
      margin-top: 2px;
    }

    .pod {
      position: absolute;
      top: 26px;
      width: 42px;
      height: 80px;
      border-radius: 24px 24px 18px 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(222,225,230,.92));
      box-shadow:
        inset 8px 4px 14px rgba(255, 255, 255, .82),
        inset -7px -10px 18px rgba(110, 116, 128, .16),
        0 14px 26px rgba(0, 0, 0, .16);
    }

    .pod.left {
      left: 38px;
      transform: rotate(-11deg);
    }

    .pod.right {
      right: 38px;
      transform: rotate(11deg);
    }

    .pod::after {
      content: "";
      position: absolute;
      left: 14px;
      bottom: -30px;
      width: 15px;
      height: 48px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(250,250,251,.96), rgba(213,217,224,.96));
      box-shadow: inset -4px -8px 10px rgba(110, 116, 128, .13);
    }

    .case-art {
      width: 170px;
      height: 114px;
      border-radius: 42px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.98), rgba(224,228,235,.94));
      box-shadow:
        inset 10px 8px 18px rgba(255, 255, 255, .8),
        inset -12px -18px 22px rgba(103, 112, 128, .16),
        0 20px 40px rgba(0, 0, 0, .16);
      position: relative;
    }

    .case-art::before {
      content: "";
      position: absolute;
      left: 28px;
      right: 28px;
      top: 33px;
      height: 2px;
      background: rgba(90, 96, 108, .13);
    }

    .hud-batteries {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .hud-meter {
      display: grid;
      justify-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .primary-action {
      height: 34px;
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 740;
      box-shadow: 0 8px 22px color-mix(in srgb, var(--accent) 30%, transparent);
      cursor: pointer;
    }

    .alert-panel,
    .settings-panel {
      padding: 14px;
      border-radius: var(--radius-card);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .30);
    }

    .panel-stack {
      display: grid;
      gap: 12px;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      font-size: 13px;
    }

    .field-row strong {
      font-size: 14px;
      font-weight: 720;
    }

    .field-copy {
      display: grid;
      gap: 2px;
    }

    .field-copy span {
      color: var(--muted);
      font-size: 11px;
    }

    .switch {
      width: 44px;
      height: 26px;
      padding: 2px;
      border: 0;
      border-radius: 999px;
      background: color-mix(in srgb, var(--green) 86%, black 0%);
      cursor: pointer;
    }

    .switch::before {
      content: "";
      display: block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0, 0, 0, .22);
      margin-left: auto;
    }

    .slider {
      appearance: none;
      width: 144px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      border: 1px solid rgba(0, 0, 0, .08);
      box-shadow: 0 2px 6px rgba(0,0,0,.22);
    }

    .reference-strip {
      position: absolute;
      left: 0;
      bottom: 4px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      opacity: .92;
    }

    .reference-card {
      width: 150px;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .46);
      border: 1px solid rgba(255, 255, 255, .28);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .10);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      backdrop-filter: blur(16px) saturate(1.2);
    }

    [data-theme="dark"] .reference-card {
      background: rgba(30, 31, 34, .52);
    }

    .reference-card img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    .reference-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
    }

    .side-panel {
      align-self: stretch;
      max-height: calc(100vh - 84px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, .38);
      border: 1px solid rgba(255, 255, 255, .28);
      box-shadow: 0 18px 60px rgba(0, 0, 0, .11);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      backdrop-filter: blur(18px) saturate(1.25);
    }

    [data-theme="dark"] .side-panel {
      background: rgba(26, 27, 30, .46);
    }

    .side-panel h1 {
      margin: 2px 2px 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .side-panel p {
      margin: 6px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-wrap: pretty;
    }

    .control-group {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .28);
      border: 1px solid rgba(255, 255, 255, .16);
    }

    [data-theme="dark"] .control-group {
      background: rgba(255, 255, 255, .055);
    }

    .control-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
      text-transform: uppercase;
    }

    .segmented {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 4px;
      padding: 4px;
      border-radius: 10px;
      background: rgba(0, 0, 0, .055);
    }

    [data-theme="dark"] .segmented {
      background: rgba(255, 255, 255, .08);
    }

    .segmented button {
      min-height: 28px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .segmented button.active {
      background: var(--panel-strong);
      color: var(--text);
      box-shadow: 0 1px 5px rgba(0, 0, 0, .10);
    }

    .notes {
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 10px;
      padding-right: 2px;
    }

    .note {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .30);
      border: 1px solid rgba(255, 255, 255, .16);
    }

    [data-theme="dark"] .note {
      background: rgba(255, 255, 255, .055);
    }

    .note strong {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .note span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .detail-drawer {
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, .24);
      border: 1px solid rgba(255, 255, 255, .16);
      display: grid;
      gap: 10px;
    }

    [data-theme="dark"] .detail-drawer {
      background: rgba(255, 255, 255, .06);
    }

    .detail-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      font-weight: 730;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .secondary-action {
      min-height: 30px;
      border: 0;
      border-radius: 9px;
      background: rgba(255, 255, 255, .34);
      color: var(--text);
      font-size: 12px;
      font-weight: 710;
      cursor: pointer;
    }

    [data-theme="dark"] .secondary-action {
      background: rgba(255, 255, 255, .09);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .workspace {
        position: static;
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .stage {
        min-height: 640px;
      }

      .popover {
        right: 50%;
        transform: translateX(50%);
        width: min(390px, calc(100vw - 36px));
        min-width: 0;
      }

      .popover-anchor {
        right: 50%;
      }

      .side-panel {
        max-height: none;
      }

      .reference-strip {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
